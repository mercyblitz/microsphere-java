# This workflow syncs every branch that belongs to the current project
# from the upstream repository. It can be triggered manually or runs automatically
# every 5 minutes.
#
# Because this repository is not a GitHub fork, the upstream is specified
# explicitly via a workflow input (default: microsphere-projects/microsphere-java).

name: Sync Branches from Upstream

on:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Upstream repository (owner/repo) to sync from'
        required: false
        default: 'microsphere-projects/microsphere-java'
  schedule:
    - cron: '*/5 * * * *'

concurrency:
  group: sync-branches-from-upstream
  cancel-in-progress: true

jobs:
  sync:
    name: Sync branches from upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync branches from upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Use the workflow_dispatch input when available, otherwise fall back to the default.
          upstream="${{ inputs.upstream_repo }}"
          if [ -z "$upstream" ]; then
            upstream="microsphere-projects/microsphere-java"
          fi

          echo "Upstream repository: $upstream"
          git remote add upstream "https://github.com/${upstream}.git"

          echo "Fetching all refs from upstream..."
          git fetch upstream

          echo "Fetching all refs from origin..."
          git fetch origin

          # Collect all branches that exist in this project (origin), excluding HEAD pointer.
          origin_branches=$(git branch -r | grep '^  origin/' | grep -v '^  origin/HEAD' | sed 's|^  origin/||')

          if [ -z "$origin_branches" ]; then
            echo "No branches found in the repository. Nothing to sync."
            exit 0
          fi

          synced=0
          skipped=0
          failed=0

          for branch in $origin_branches; do
            echo "---"
            # Only sync branches that also exist in upstream.
            if ! git ls-remote --exit-code upstream "refs/heads/${branch}" > /dev/null 2>&1; then
              echo "Branch '${branch}' does not exist in upstream – skipping."
              skipped=$((skipped + 1))
              continue
            fi

            echo "Syncing branch '${branch}' from upstream..."
            git checkout -B "$branch" "origin/${branch}"

            # Reset the local branch to exactly match upstream.
            if git reset --hard "upstream/${branch}"; then
              if git push origin "${branch}" --force-with-lease; then
                echo "Branch '${branch}' synced successfully."
                synced=$((synced + 1))
              else
                echo "::warning::Failed to push branch '${branch}'."
                failed=$((failed + 1))
              fi
            else
              echo "::warning::Failed to reset branch '${branch}' to upstream."
              failed=$((failed + 1))
            fi
          done

          echo "==="
          echo "Sync complete: synced=${synced}, skipped=${skipped}, failed=${failed}"
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi
